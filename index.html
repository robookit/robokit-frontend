<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robokit — كيتات أردوينو هندسية كاملة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>

/* ===== Hero / Animation ===== */
.hero{
  position:relative; height:100vh;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(var(--border) 1px,transparent 1px);
  background-size:30px 30px;opacity:.35;
  mask-image:radial-gradient(circle at 50% 55%, black 0%, transparent 70%);
}

.scene{ position:relative; width:360px; height:360px; perspective:1000px; }

.box-base{
  position:absolute; bottom:40px; left:50%;
  width:240px; height:120px;
  transform:translateX(-50%);
  background:linear-gradient(155deg,#1b1a18 0%,#15130f 100%);
  border:1.5px solid #2e2a24;
  border-radius:6px;
  box-shadow:0 30px 60px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.02);
}
.box-base::before{
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:64%; height:5px; background:var(--orange); border-radius:0 0 3px 3px;
}
.box-base::after{
  content:'ROBOKIT'; position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace; font-size:.78rem; letter-spacing:.3em; color:var(--text-faint);
}

.box-lid{
  position:absolute; bottom:158px; left:50%;
  width:240px; height:130px; margin-left:-120px;
  transform-origin:bottom center;
  background:linear-gradient(155deg,#211f1a 0%,#1b1a18 100%);
  border:1.5px solid #2e2a24; border-bottom:none;
  border-radius:6px 6px 0 0;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
  transform:rotateX(0deg);
  transform-style:preserve-3d;
}
.box-lid::before{
  content:''; position:absolute; inset:14px; border:1px dashed #3a352c; border-radius:3px;
}
.lid-mark{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.lid-bot{ width:46px;height:46px;border-radius:50%;background:var(--orange); display:flex;align-items:center;justify-content:center; }
.lid-bot-inner{ width:58%;height:46%;background:#1b1a18; border-radius:6px; display:flex; align-items:center; justify-content:center; gap:5px; }
.lid-eye{ width:5px;height:9px;background:var(--orange);border-radius:2px; }

.box-glow{
  position:absolute; bottom:48px; left:50%; transform:translateX(-50%);
  width:200px; height:100px; border-radius:6px;
  background:radial-gradient(ellipse at 50% 30%, rgba(255,90,31,.35), transparent 70%);
  opacity:0; filter:blur(2px);
}

/* ===== الكيت اللي يطلع من الصندوق ===== */
.kit-rising{
  position:absolute;
  bottom:55px; left:50%; transform:translateX(-50%);
  width:200px;
  background:var(--surface-2);
  border:1.5px solid var(--orange-dim);
  border-radius:10px;
  padding:14px 16px;
  opacity:0;
  box-shadow:0 0 30px rgba(255,90,31,.15), 0 20px 40px rgba(0,0,0,.5);
}
.kit-rising-code{
  font-family:'JetBrains Mono',monospace; font-size:.7rem; color:var(--text-faint); display:block; margin-bottom:6px;
}
.kit-rising-title{ font-size:.88rem; font-weight:800; margin-bottom:4px; }
.kit-rising-desc{ font-size:.75rem; color:var(--text-muted); margin-bottom:8px; }
.kit-rising-price{
  font-family:'JetBrains Mono',monospace; font-size:1rem; font-weight:700; color:var(--orange);
}

.beam{
  position:absolute; bottom:150px; left:50%; transform:translateX(-50%);
  width:4px; height:0;
  background:linear-gradient(to top, var(--orange), transparent);
  opacity:0;
}

/* ===== نص الهيرو يظهر بعد الأنميشن ===== */
.hero-text-block{
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:24px;
  opacity:0;
}
.eyebrow{
  display:inline-flex;font-family:'JetBrains Mono',monospace;font-size:.78rem;
  color:var(--orange);border:1px solid var(--orange-dim);border-radius:999px;
  padding:6px 16px;letter-spacing:.06em;margin-bottom:18px;
}
.hero-title{ font-size:clamp(2.2rem,5vw,3.5rem);font-weight:900;line-height:1.15;margin-bottom:14px; }
.hero-title span{ color:var(--orange); }
.hero-text-block p{ color:var(--text-muted);font-size:1rem;max-width:420px;margin-bottom:26px; }

/* ===== يلا نهندس ===== */
.lets-build{
  padding-block:70px;
  text-align:center;
  border-top:1px solid var(--border);
}
.lets-build-text{
  font-size:clamp(2.4rem,6vw,5rem);
  font-weight:900;
  line-height:1.1;
  display:inline-block;
}
.lets-build-text span{ color:var(--orange); }
.lets-build-sub{
  display:block;
  font-family:'JetBrains Mono',monospace;
  font-size:.82rem;
  color:var(--text-faint);
  letter-spacing:.1em;
  margin-top:12px;
}

/* ===== الكيتات العشوائية ===== */
.random-kits{
  padding-block:0 70px;
  border-bottom:1px solid var(--border);
}
.random-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  max-width:680px;
  margin-inline:auto;
}
.kit-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:26px;display:flex;flex-direction:column;gap:12px;
  transition:border-color .2s,transform .2s;position:relative;overflow:hidden;
}
.kit-card:hover{ border-color:var(--orange-dim);transform:translateY(-3px); }
.kit-card::before{
  content:'';position:absolute;top:0;right:0;left:0;height:2px;
  background:var(--orange);transform:scaleX(0);transform-origin:right;transition:transform .3s;
}
.kit-card:hover::before{ transform:scaleX(1); }
.kit-card-top{ display:flex;align-items:center;justify-content:space-between; }
.kit-code{ font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text-faint); }
.kit-lvl{ display:flex;gap:4px; }
.kit-lvl span{ width:7px;height:7px;border-radius:50%;background:var(--border); }
.kit-lvl span.on{ background:var(--orange);box-shadow:0 0 5px var(--orange); }
.kit-title{ font-size:1.05rem;font-weight:800; }
.kit-desc{ font-size:.86rem;color:var(--text-muted);flex-grow:1; }
.kit-price{ font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:700;color:var(--orange); }
.kit-price small{ font-size:.75rem;color:var(--text-muted);font-weight:400;margin-inline-start:4px; }
.kit-btn{ width:100%; }

/* ===== رابط الكيتات ===== */
.all-kits{
  padding-block:60px;
  text-align:center;
  border-bottom:1px solid var(--border);
}
.all-kits p{
  color:var(--text-muted);font-size:.96rem;margin-bottom:22px;
}

@media(max-width:600px){
  .random-grid{ grid-template-columns:1fr; max-width:340px; }
  .lets-build{ padding-block:50px; }
}
</style>
</head>
<body>

<div id="headerMount"></div>

<!-- ===== Hero Animation ===== -->
<section class="hero">
  <div class="scene">
    <div class="beam" id="beam"></div>
    <div class="box-glow" id="boxGlow"></div>

    <!-- الكيت اللي يطلع من الصندوق -->
    <div class="kit-rising" id="kitRising">
      <span class="kit-rising-code" id="risingCode"></span>
      <div class="kit-rising-title" id="risingTitle"></div>
      <div class="kit-rising-desc" id="risingDesc"></div>
      <div class="kit-rising-price" id="risingPrice"></div>
    </div>

    <div class="box-lid" id="boxLid">
      <div class="lid-mark">
        <div class="lid-bot"><div class="lid-bot-inner"><span class="lid-eye"></span><span class="lid-eye"></span></div></div>
      </div>
    </div>
    <div class="box-base" id="boxBase"></div>

    <!-- الأنميشن يتكرر على طول — بدون نص هيرو ثابت -->
  </div>
</section>

<!-- ===== يلا نهندس ===== -->
<div class="lets-build">
  <div class="container">
    <span class="lets-build-text">يلا <span>نهندس</span></span>
    <span class="lets-build-sub">15 مشروع · 3 مستويات · كل قطعة جاهزة</span>
  </div>
</div>

<!-- ===== الكيتات العشوائية ===== -->
<div class="random-kits">
  <div class="container">
    <div class="random-grid" id="randomGrid">
      <!-- تُحمّل من الكتالوج -->
    </div>
  </div>
</div>

<!-- ===== رابط صفحة الكيتات ===== -->
<div class="all-kits">
  <div class="container">
    <p>عندك 15 مشروع تنتظرك — من أول دائرة تبنيها لأول روبوت تطيّره.</p>
    <a href="projects.html" class="btn btn-primary">عرض كل الكيتات</a>
  </div>
</div>

<footer class="site-footer" id="contact">
  <div class="container footer-inner">
    <div class="brand"><span class="brand-mark"><span class="bot-face"><span class="eye"></span><span class="eye"></span></span></span><span class="brand-text">ROBOKIT</span></div>
    <div class="footer-links">
      <a href="projects.html">الكيتات</a>
      <a href="videos.html">الفيديوهات</a>
      <a href="mailto:support@robokit.jo">تواصل معنا</a>
      <a href="admin.html">لوحة التحكم</a>
    </div>
    <span class="footer-copy">© 2026 Robokit</span>
  </div>
</footer>

<div id="cartMount"></div>
<div id="toast"></div>
<script src="shared.js"></script>
<script>
const DOTS = {medium:1,strong:2,extreme:3};
let LEVELS = null;
let featuredItem = null;

// ===== Animation =====
const boxLid   = document.getElementById('boxLid');
const boxBase  = document.getElementById('boxBase');
const boxGlow  = document.getElementById('boxGlow');
const beam     = document.getElementById('beam');
const kitRising = document.getElementById('kitRising');

function pickRandomItem(levels){
  const allItems = [];
  Object.entries(levels).forEach(([lk,level])=>{
    level.items.forEach(item=>allItems.push({lk,item}));
  });
  return allItems[Math.floor(Math.random()*allItems.length)];
}

function runAnimation(pick){
  if(pick){
    document.getElementById('risingCode').textContent  = pick.item.code;
    document.getElementById('risingTitle').textContent = pick.item.title;
    document.getElementById('risingDesc').textContent  = pick.item.desc.slice(0,60)+(pick.item.desc.length>60?'…':'');
    document.getElementById('risingPrice').textContent = kitTotal(pick.item)+' '+CURRENCY;
  }

  // reset
  boxLid.style.transition = 'none';
  boxLid.style.transform = 'rotateX(0deg)';
  boxLid.style.opacity = '1';
  boxBase.style.opacity = '1';
  boxGlow.style.transition = 'none';
  boxGlow.style.opacity = '0';
  beam.style.transition = 'none';
  beam.style.height = '0';
  beam.style.opacity = '0';
  kitRising.style.transition = 'none';
  kitRising.style.opacity = '0';
  kitRising.style.transform = 'translateX(-50%) translateY(30px) scale(.9)';
  void boxLid.offsetWidth;

  requestAnimationFrame(()=>{
    // 1) lid opens
    boxLid.style.transition = 'transform 1600ms cubic-bezier(.2,.8,.2,1)';
    boxLid.style.transform = 'rotateX(-125deg)';

    // 2) glow
    boxGlow.style.transition = 'opacity 900ms ease 800ms';
    boxGlow.style.opacity = '.9';

    // 3) beam
    beam.style.transition = 'height 800ms ease 900ms, opacity 400ms ease 1700ms';
    beam.style.height = '220px';
    beam.style.opacity = '1';
    setTimeout(()=>{ beam.style.opacity = '0'; }, 1800);

    // 4) كيت يطلع
    setTimeout(()=>{
      kitRising.style.transition = 'opacity 700ms ease, transform 800ms cubic-bezier(.34,1.56,.64,1)';
      kitRising.style.opacity = '1';
      kitRising.style.transform = 'translateX(-50%) translateY(-30px) scale(1)';
    }, 1200);

    // 5) كل شي يختفي، وبعد ثانية يبدأ من جديد بكيت عشوائي جديد
    setTimeout(()=>{
      [boxLid, boxBase, boxGlow, kitRising].forEach(el=>{
        el.style.transition = 'opacity 700ms ease';
        el.style.opacity = '0';
      });
      // انتظر انتهاء الـ fade out ثم أعد التشغيل
      setTimeout(()=>{
        const nextPick = LEVELS ? pickRandomItem(LEVELS) : null;
        runAnimation(nextPick);
      }, 1000);
    }, 3800);
  });
}

// ===== Random kits grid =====
function renderRandomKits(){
  if(!LEVELS) return;
  const allItems = [];
  Object.entries(LEVELS).forEach(([lk,level])=>{
    level.items.forEach(item=>allItems.push({lk,item}));
  });
  // shuffle & pick 2
  const shuffled = allItems.sort(()=>Math.random()-.5);
  const picks = shuffled.slice(0,2);

  document.getElementById('randomGrid').innerHTML = picks.map(({lk,item})=>{
    const n=DOTS[lk];
    const dots=[1,2,3].map(i=>`<span class="${i<=n?'on':''}"></span>`).join('');
    return `<a href="kit.html?level=${lk}&code=${item.code}" class="kit-card">
      <div class="kit-card-top">
        <span class="kit-code">${item.code}</span>
        <span class="kit-lvl">${dots}</span>
      </div>
      <div class="kit-title">${escHtml(item.title)}</div>
      <div class="kit-desc">${escHtml(item.desc)}</div>
      <div class="kit-price">${kitTotal(item)}<small>${CURRENCY}</small></div>
      <span class="btn btn-outline btn-sm kit-btn">التفاصيل والشراء</span>
    </a>`;
  }).join('');
}

// ===== Init =====
(async function(){
  document.getElementById('headerMount').innerHTML = renderHeader('home');
  document.getElementById('cartMount').innerHTML = renderCartDrawer();
  updateCartBadge();
  await detectApi();
  LEVELS = await loadCatalog();
  const pick = LEVELS ? pickRandomItem(LEVELS) : null;
  runAnimation(pick);
  renderRandomKits();
})();
</script>
</body>
</html>
