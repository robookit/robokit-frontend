<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robokit — كيتات أردوينو هندسية كاملة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.placeholder{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px;gap:18px;}
.placeholder .bot-xl{width:110px;height:110px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.placeholder .bot-face{width:60%;height:48%;background:var(--bg);border-radius:14px;display:flex;align-items:center;justify-content:center;gap:10px;}
.placeholder .eye{width:13px;height:24px;background:var(--orange);border-radius:4px;box-shadow:0 0 14px var(--orange);animation:blink 5s infinite;}
.placeholder .eye:nth-child(2){animation-delay:.12s;}
.placeholder h1{font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:900;}
.placeholder p{color:var(--text-muted);font-size:1rem;max-width:480px;}
.placeholder-actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:12px;}
</style>
</head>
<body>
<div id="headerMount"></div>

<main>
  <div class="placeholder">
    <div class="bot-xl"><div class="bot-face"><span class="eye"></span><span class="eye"></span></div></div>
    <h1>ROBOKIT</h1>
    <p>المحتوى التعريفي لهذه الصفحة قيد الإعداد حاليًا.</p>
    <div class="placeholder-actions">
      <a href="projects.html" class="btn btn-primary">تصفح الكيتات</a>
      <a href="videos.html" class="btn btn-outline">مكتبة الفيديوهات</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <div class="brand"><span class="brand-mark"><span class="bot-face"><span class="eye"></span><span class="eye"></span></span></span><span class="brand-text">ROBOKIT</span></div>
    <div class="footer-links">
      <a href="projects.html">الكيتات</a>
      <a href="videos.html">الفيديوهات</a>
      <a href="mailto:support@robokit.jo">تواصل معنا</a>
      <a href="admin.html">لوحة التحكم</a>
    </div>
    <span class="footer-copy">© 2026 Robokit</span>
  </div>
</footer>

<div id="cartMount"></div>
<div id="toast"></div>
<script src="shared.js"></script>
<script>
(async function(){
  document.getElementById('headerMount').innerHTML = renderHeader('home');
  document.getElementById('cartMount').innerHTML = renderCartDrawer();
  updateCartBadge();
  await detectApi();
})();
</script>
</body>
</html>
